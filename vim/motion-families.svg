<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 920" role="img" aria-labelledby="title desc">
  <title id="title">Vim motion families</title>
  <desc id="desc">Ordered chain from grid motion through marks</desc>
  <defs>
    <linearGradient id="bgm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#1a1b26"/><stop offset="100%" style="stop-color:#0f0f14"/>
    </linearGradient>
    <linearGradient id="boxg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#24283b"/><stop offset="100%" style="stop-color:#1f2335"/>
    </linearGradient>
    <filter id="glowm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#7aa2f7" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgm)"/>
  <text x="280" y="38" text-anchor="middle" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="18" font-weight="700">Motion families</text>
  <text x="280" y="60" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">rough learning / dependency flow</text>
  <g filter="url(#glowm)">
    <rect x="80" y="78" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="108" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Grid &amp; column</text>
    <text x="100" y="128" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">h j k l &#183; |n &#183; counts</text>
    <path d="M280 146 L280 168" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="170" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="200" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Words</text>
    <text x="100" y="220" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">w W e E b B ge gE</text>
    <path d="M280 238 L280 260" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="262" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="292" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Line anchors</text>
    <text x="100" y="312" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">0 ^ g^ $ g_ g$ + - _</text>
    <path d="M280 330 L280 352" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="354" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="384" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Vertical &amp; file</text>
    <text x="100" y="404" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">( ) { } [[ ]] [] ][ [( ]) &#183; gg G nG</text>
    <path d="M280 422 L280 444" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="446" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="476" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Screen &amp; scroll</text>
    <text x="100" y="496" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">H M L &#183; zt zz zb &#183; Ctrl-e/y/f/b/d/u</text>
    <path d="M280 514 L280 536" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="538" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="568" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Same-line search</text>
    <text x="100" y="588" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">f F t T &#183; ; ,</text>
    <path d="M280 606 L280 628" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="630" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="660" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Pattern search</text>
    <text x="100" y="680" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">/ ? &#183; n N &#183; * # g* g#</text>
    <path d="M280 698 L280 720" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="722" width="400" height="68" rx="12" fill="url(#boxg)" stroke="#3b4261" stroke-width="1.5"/>
    <text x="100" y="752" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Text objects</text>
    <text x="100" y="772" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">i / a + w s p quotes ( ) { } [ ] &lt; &gt; t</text>
    <path d="M280 790 L280 812" stroke="#7aa2f7" stroke-width="2.5"/>
    <rect x="80" y="814" width="400" height="78" rx="12" fill="url(#boxg)" stroke="#9ece6a" stroke-width="1.5"/>
    <text x="100" y="844" fill="#9ece6a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">Jumps &amp; marks</text>
    <text x="100" y="864" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">% &#183; Ctrl-o Ctrl-i &#183; g; g, &#183; '' &#183; ` mark &#183; ' mark &#183; m[a-zA-Z]</text>
    <text x="100" y="882" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">Full detail: :help motion.txt, :help text-objects</text>
  </g>
</svg>
