<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">Line anchor motions 0 ^ $ g_</title>
  <desc id="desc">Line with trailing spaces so dollar and g underscore differ</desc>
  <defs>
    <linearGradient id="bgl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#1a1b26"/><stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgl)"/>
  <text x="40" y="44" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="600">Line anchors</text>
  <text x="40" y="68" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">Trailing spaces make </text>
  <text x="248" y="68" fill="#f7768e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">$</text>
  <text x="260" y="68" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13"> and </text>
  <text x="300" y="68" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">g_</text>
  <text x="330" y="68" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13"> differ:</text>
  <text x="40" y="118" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="24" font-weight="500">    code_here;··</text>
  <text x="40" y="142" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">(·· = two visible spaces for trailing blanks)</text>
  <!-- approximate char width 14.5 for 24px mono -->
  <line x1="40" y1="150" x2="40" y2="178" stroke="#9ece6a" stroke-width="2.5"/>
  <line x1="98" y1="150" x2="98" y2="178" stroke="#7aa2f7" stroke-width="2.5"/>
  <line x1="333" y1="150" x2="333" y2="178" stroke="#bb9af7" stroke-width="2.5"/>
  <line x1="362" y1="150" x2="362" y2="178" stroke="#f7768e" stroke-width="2.5"/>
  <text x="40" y="200" text-anchor="middle" fill="#9ece6a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="700">0</text>
  <text x="98" y="200" text-anchor="middle" fill="#7aa2f7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="700">^</text>
  <text x="333" y="200" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">g_</text>
  <text x="362" y="200" text-anchor="middle" fill="#f7768e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="700">$</text>
  <text x="40" y="220" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">column 0</text>
  <text x="98" y="220" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">first non-blank</text>
  <text x="333" y="220" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">last non-blank</text>
  <text x="362" y="220" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">true EOL</text>
  <text x="40" y="258" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">g^ and g$ mirror ^ and $ on wrapped screen lines when wrap is on.</text>
</svg>
