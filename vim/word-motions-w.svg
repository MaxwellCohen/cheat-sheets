<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" role="img" aria-labelledby="title desc">
  <title id="title">w motion stepping through words</title>
  <desc id="desc">String one.two three with carets at start, dot, t of two, t of three</desc>
  <defs>
    <linearGradient id="bgw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#1a1b26"/><stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgw)"/>
  <text x="40" y="52" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">From line start, each </text>
  <text x="268" y="52" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">w</text>
  <text x="288" y="52" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14"> ? next word start:</text>
  <text x="40" y="108" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="500">one.two three</text>
  <!-- caret x: 40 + i*17.2 for font ~28 -->
  <path d="M42 116 L42 130 L50 124 Z" fill="#9ece6a"/>
  <path d="M91.6 116 L91.6 130 L99.6 124 Z" fill="#7aa2f7"/>
  <path d="M108.8 116 L108.8 130 L116.8 124 Z" fill="#7aa2f7"/>
  <path d="M176.8 116 L176.8 130 L184.8 124 Z" fill="#7aa2f7"/>
  <line x1="46" y1="138" x2="91.6" y2="162" stroke="#3b4261" stroke-width="1.5"/>
  <line x1="95.6" y1="138" x2="108.8" y2="162" stroke="#3b4261" stroke-width="1.5"/>
  <line x1="112.8" y1="138" x2="176.8" y2="162" stroke="#3b4261" stroke-width="1.5"/>
  <text x="62" y="182" fill="#9ece6a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">o (start)</text>
  <text x="92" y="182" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">1st ? .</text>
  <text x="132" y="182" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">2nd ? two</text>
  <text x="188" y="182" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">3rd ? three</text>
  <rect x="380" y="78" width="240" height="115" rx="8" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="395" y="108" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">A </text>
  <text x="420" y="108" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">WORD</text>
  <text x="480" y="108" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12"> is non-blank run;</text>
  <text x="395" y="132" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">one.two</text>
  <text x="485" y="132" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12"> is one WORD.</text>
  <text x="395" y="158" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">W</text>
  <text x="410" y="158" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12"> jumps past it; </text>
  <text x="530" y="158" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">w</text>
  <text x="545" y="158" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12"> steps inside.</text>
  <text x="395" y="180" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">(See </text>
  <text x="430" y="180" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">iskeyword</text>
  <text x="510" y="180" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11"> for 'word' chars.)</text>
</svg>
