<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" role="img" aria-labelledby="title desc">
  <title id="title">Operator then motion</title>
  <desc id="desc">Flow from operator through operator-pending to motion and text span</desc>
  <defs>
    <linearGradient id="bgo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#1a1b26"/><stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7aa2f7"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgo)"/>
  <text x="40" y="36" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="600">Operator + motion</text>
  <g filter="url(#shadow)">
    <rect x="40" y="52" width="150" height="56" rx="10" fill="#24283b" stroke="#bb9af7" stroke-width="2"/>
    <text x="115" y="78" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">d c y gU ...</text>
    <text x="115" y="96" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">operator</text>
    <path d="M190 80 L218 80" stroke="#7aa2f7" stroke-width="2.5" marker-end="url(#arr)"/>
    <rect x="220" y="52" width="168" height="56" rx="10" fill="#24283b" stroke="#7aa2f7" stroke-width="2"/>
    <text x="304" y="78" text-anchor="middle" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">operator-pending</text>
    <text x="304" y="96" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">waiting for range</text>
    <path d="M388 80 L416 80" stroke="#7aa2f7" stroke-width="2.5" marker-end="url(#arr)"/>
    <rect x="418" y="52" width="200" height="56" rx="10" fill="#24283b" stroke="#9ece6a" stroke-width="2"/>
    <text x="518" y="78" text-anchor="middle" fill="#9ece6a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">motion / text object</text>
    <text x="518" y="96" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">e.g. w ap i"</text>
    <path d="M618 80 L646 80" stroke="#7aa2f7" stroke-width="2.5" marker-end="url(#arr)"/>
    <rect x="648" y="52" width="72" height="56" rx="10" fill="#1f2335" stroke="#f7768e" stroke-width="2"/>
    <text x="684" y="88" text-anchor="middle" fill="#f7768e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">span</text>
  </g>
  <text x="40" y="128" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">Counts apply to the motion: </text>
  <text x="268" y="128" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="600">d3w</text>
  <text x="310" y="128" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">  /  </text>
  <text x="322" y="128" fill="#c0caf5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="600">2de</text>
</svg>
