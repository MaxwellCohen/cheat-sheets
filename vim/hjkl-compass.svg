<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" role="img" aria-labelledby="title desc">
  <title id="title">hjkl motion compass</title>
  <desc id="desc">Four-way diagram: h left, l right, k up, j down from center cursor</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <g opacity="0.12" fill="#3b4261">
    <circle cx="260" cy="200" r="140" stroke="#3b4261" stroke-width="1" fill="none"/>
    <circle cx="260" cy="200" r="90" stroke="#3b4261" stroke-width="1" fill="none"/>
  </g>
  <!-- crosshair -->
  <line x1="260" y1="80" x2="260" y2="320" stroke="#3b4261" stroke-width="2"/>
  <line x1="120" y1="200" x2="400" y2="200" stroke="#3b4261" stroke-width="2"/>
  <!-- arrows -->
  <g fill="none" stroke="#7aa2f7" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M260 200 L260 105 M245 120 L260 95 L275 120"/>
    <path d="M260 200 L260 295 M245 280 L260 305 L275 280"/>
    <path d="M260 200 L165 200 M180 185 L155 200 L180 215"/>
    <path d="M260 200 L355 200 M340 185 L365 200 L340 215"/>
  </g>
  <!-- center cursor block -->
  <rect x="245" y="185" width="30" height="30" rx="4" fill="#9ece6a" opacity="0.9"/>
  <rect x="252" y="188" width="4" height="24" rx="1" fill="#1a1b26" opacity="0.85"/>
  <!-- labels -->
  <text x="260" y="72" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700">k</text>
  <text x="260" y="352" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700">j</text>
  <text x="100" y="208" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700">h</text>
  <text x="420" y="208" text-anchor="middle" fill="#bb9af7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700">l</text>
  <text x="260" y="48" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">up</text>
  <text x="260" y="378" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">down</text>
  <text x="70" y="208" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">left</text>
  <text x="450" y="208" text-anchor="middle" fill="#565f89" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">right</text>
  <text x="260" y="388" text-anchor="middle" fill="#7dcfff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="600">hjkl - character grid</text>
</svg>
